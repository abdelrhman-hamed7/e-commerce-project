name: AuraTech Agency CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laptop_agency_db
          POSTGRES_USER: auratech_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U auratech_user -d laptop_agency_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pgsql, pdo, pdo_pgsql

      - name: Install dependencies (if any)
        run: |
          php -v

      - name: Wait for PostgreSQL to be ready
        run: |
          sleep 20

      - name: Run basic PHP syntax check
        run: |
          find . -name "*.php" -exec php -l {} \;

      - name: Test DB Connection
        run: |
          php -r "
          \$pdo = new PDO('pgsql:host=127.0.0.1;port=5432;dbname=laptop_agency_db', 'auratech_user', 'test_password');
          \$pdo->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
          echo 'DB Connected Successfully';
          "

      - name: Validate Docker Build
        run: |
          docker build -t auratech-web-test .

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Production Server (Webhook Trigger)
        run: |
          echo "Starting deployment process..."

          # مثال webhook (Render / VPS / cPanel / Railway / etc.)
          curl -X POST "https://your-deployment-webhook-url.com/deploy" \
          -H "Content-Type: application/json" \
          -d '{"project":"AuraTech","status":"deploy_triggered"}'

          echo "Deployment triggered successfully"
