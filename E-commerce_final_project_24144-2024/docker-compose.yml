services:
  app:
    build: .
    container_name: auratech_app
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: ${PORT:-8080}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE in .env}
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-true}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: auratech_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:?Set DB_DATABASE in .env}
      POSTGRES_USER: ${DB_USERNAME:?Set DB_USERNAME in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
