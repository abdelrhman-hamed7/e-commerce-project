version: '3.8'

services:
  # Web Service (PHP + Apache)
  web:
    build: .
    container_name: auratech_web_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/
    depends_on:
      - db
    networks:
      - auratech_network

  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: auratech_postgres_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root_password
      POSTGRES_DB: laptop_agency_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - auratech_network

networks:
  auratech_network:
    driver: bridge

volumes:
  pg_data: