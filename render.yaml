services:
  - type: web
    name: auratech-ecommerce
    runtime: docker
    plan: free
    dockerfilePath: E-commerce_final_project_24144-2024/Dockerfile
    dockerContext: E-commerce_final_project_24144-2024
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: auratech-postgres
          property: connectionString
      - key: AUTO_INIT_DB
        value: true

databases:
  - name: auratech-postgres
    plan: free
    databaseName: laptop_agency_db
    user: auratech_user
